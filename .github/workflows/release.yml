# 史莱姆区块扫描器 - 发布工作流
#
# 该工作流会:
# 1. 检出代码（含 slime-calculator 子模块）
# 2. 在对应平台上安装 CUDA Toolkit 并编译 CUDA/C 程序
# 3. build.rs 自动将编译产物打包进 Tauri 应用
# 4. 发布各平台的直接可运行文件到 GitHub Releases

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本 (如 v0.1.0)"
        required: true
        type: string

# 需要 contents: write 权限来创建 Release 并上传构建产物
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: "史莱姆区块扫描器 ${{ steps.get_version.outputs.version }}"
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🐌 史莱姆区块扫描器 ${{ steps.get_version.outputs.version }}

            ### 📦 下载
            | 平台 | 文件 |
            |------|------|
            | macOS (Intel) | `史莱姆区块扫描器.app` |
            | macOS (Apple Silicon) | `史莱姆区块扫描器.app` |
            | Windows | `*.exe` |
            | Linux | `*.AppImage` |

            ### ⚠️ 使用说明
            - **macOS**: 下载 `.app` 直接运行（若提示安全风险 → 系统设置 → 隐私与安全性 → 仍要打开）
            - **Windows**: 下载 `.exe` 安装即可
            - **Linux**: 下载 `.AppImage`，`chmod +x` 后运行
            - CUDA 程序已内嵌在包内，开箱即用

            ### 🔧 系统要求
            - **GPU**: NVIDIA 显卡（支持 CUDA）
            - **驱动**: 安装最新的 NVIDIA 驱动

  # ════════════════════════════════════════════════
  # macOS 构建
  # ════════════════════════════════════════════════
  build-macos:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            ${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          bun install
          cd src-tauri && cargo fetch

      # macOS: 只编译纯 C 部分 (slime_cmp)
      # CUDA 部分需用户在有 NVIDIA GPU 的机器上自行编译
      - name: 编译 C 程序 (slime_cmp)
        run: |
          cd slime-calculator
          mkdir -p build
          gcc -o build/slime_cmp slime_cmp.c -lm -O3 -march=native -flto

      - name: Build Tauri App (macOS ${{ matrix.arch }})
        run: bun tauri build --target ${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload .app
        uses: softprops/action-gh-release@v3
        with:
          files: src-tauri/target/${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}/release/bundle/macos/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════
  # Windows 构建
  # ════════════════════════════════════════════════
  build-windows:
    needs: create-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: "13.2.0"

      - name: Install dependencies
        run: |
          bun install
          cd src-tauri && cargo fetch

      # Windows: 编译 C 和 CUDA 程序
      - name: 编译 slime_cmp (C)
        run: |
          cd slime-calculator
          mkdir build -Force
          gcc -o build/slime_cmp.exe slime_cmp.c -lm -O3
        shell: pwsh

      - name: 编译 slime_main (CUDA)
        run: |
          cd slime-calculator
          nvcc -o build/slime_main.exe slime_main.cu -O3 -use_fast_math -arch=native
        shell: pwsh

      - name: 编译 slime_circle (CUDA)
        run: |
          cd slime-calculator
          nvcc -o build/slime_circle.exe slime_circle.cu -O3 -use_fast_math -arch=native
        shell: pwsh

      - name: Build Tauri App (Windows)
        run: bun tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload .exe
        uses: softprops/action-gh-release@v3
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════
  # Linux 构建
  # ════════════════════════════════════════════════
  build-linux:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: "13.2.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: |
          bun install
          cd src-tauri && cargo fetch

      # Linux: 编译 C 和 CUDA 程序
      - name: 编译所有程序
        run: |
          cd slime-calculator
          mkdir -p build
          gcc -o build/slime_cmp slime_cmp.c -lm -O3 -march=native -flto
          nvcc -o build/slime_main slime_main.cu -O3 -use_fast_math -arch=native
          nvcc -o build/slime_circle slime_circle.cu -O3 -use_fast_math -arch=native

      - name: Build Tauri App (Linux)
        run: bun tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload .AppImage
        uses: softprops/action-gh-release@v3
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────
  # 发布完成 - 标记为正式版
  # ────────────────────────────────────────────────
  finalize:
    needs: [create-release, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Finalize Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
