# 史莱姆区块扫描器 - 发布工作流
#
# 该工作流会:
# 1. 检出代码
# 2. 编译 Tauri 应用
# 3. 发布各平台的 zip 包到 GitHub Releases

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本 (如 v0.1.0)"
        required: true
        type: string

# 需要 contents: write 权限来创建 Release 并上传构建产物
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: "史莱姆区块扫描器 ${{ steps.get_version.outputs.version }}"
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🐌 史莱姆区块扫描器 ${{ steps.get_version.outputs.version }}

            ### 📦 下载
            | 平台 | 文件 |
            |------|------|
            | Windows | `slime-calculator-windows.zip` |
            | Linux | `slime-calculator-linux.zip` |

            ### ⚠️ 使用说明
            - **Windows**: 下载 zip，解压运行安装程序即可
            - **Linux**: 下载 zip，解压后 `chmod +x SlimeCalculator && ./SlimeCalculator`
            - CUDA 程序已内嵌在包内，开箱即用

            ### 🔧 系统要求
            - **GPU**: NVIDIA 显卡（支持 CUDA）
            - **驱动**: 安装最新的 NVIDIA 驱动

  # ════════════════════════════════════════════════
  # Windows 构建
  # ════════════════════════════════════════════════
  build-windows:
    needs: create-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          bun install
          cd src-tauri && cargo fetch

      - name: Download CUDA binaries
        uses: robinraju/release-downloader@v1.2
        with:
          repository: 'minelogy-dev/slime-calculator'
          latest: true
          fileName: '*'
          out-file-path: 'downloaded_bins'

      - name: Build Tauri App (Windows)
        run: bun tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package and upload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/libs
          Copy-Item src-tauri/target/release/slim-calculator.exe staging/SlimeCalculator.exe
          Copy-Item downloaded_bins/* staging/libs/
          Compress-Archive -Path staging/* -DestinationPath slime-calculator-windows.zip
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: slime-calculator-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════
  # Linux 构建
  # ════════════════════════════════════════════════
  build-linux:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: |
          bun install
          cd src-tauri && cargo fetch

      - name: Download CUDA binaries
        uses: robinraju/release-downloader@v1.2
        with:
          repository: 'minelogy-dev/slime-calculator'
          latest: true
          fileName: '*'
          out-file-path: 'downloaded_bins'

      - name: Build Tauri App (Linux)
        run: bun tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package and upload
        run: |
          mkdir -p staging/libs
          cp src-tauri/target/release/slim-calculator staging/SlimeCalculator
          cp downloaded_bins/* staging/libs/
          cd staging && zip -r ../slime-calculator-linux.zip *
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          files: slime-calculator-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────
  # 发布完成 - 标记为正式版
  # ────────────────────────────────────────────────
  finalize:
    needs: [create-release, build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Finalize Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
